<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Red Ball</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial,sans-serif;
}

canvas{
display:block;
background:linear-gradient(#87ceeb,#dff6ff);
}

#ui{
position:fixed;
bottom:20px;
left:0;
width:100%;
z-index:999;
pointer-events:none;
}

.btn{
pointer-events:auto;
width:75px;
height:75px;
border:none;
border-radius:50%;
font-size:30px;
background:white;
opacity:.8;
}

#jump{
position:absolute;
left:20px;
}

#left{
position:absolute;
right:110px;
}

#right{
position:absolute;
right:20px;
}

#message{
position:fixed;
top:40%;
width:100%;
text-align:center;
font-size:42px;
font-weight:bold;
display:none;
}

#restart{
position:fixed;
top:55%;
left:50%;
transform:translateX(-50%);
padding:12px 25px;
font-size:20px;
display:none;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="message"></div>
<button id="restart" onclick="location.reload()">Restart</button>

<div id="ui">
<button class="btn" id="jump">⬆</button>
<button class="btn" id="left">⬅</button>
<button class="btn" id="right">➡</button>
</div>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let cameraX=0;
let gameEnded=false;

const player={
x:80,
y:450,
r:22,
vx:0,
vy:0,
ground:false
};

const gravity=0.7;

const grounds=[
{x:0,w:650},
{x:800,w:700},
{x:1700,w:1500}
];

const hills=[
{x:350,y:420,w:140,h:60},
{x:550,y:350,w:180,h:80},
{x:1050,y:390,w:180,h:80},
{x:1300,y:310,w:220,h:100},
{x:1900,y:420,w:200,h:80},
{x:2300,y:330,w:220,h:100}
];

const flag={
x:2900,
y:250,
h:150
};

let left=false;
let right=false;

function win(){
gameEnded=true;
message.style.display="block";
message.innerHTML="KAZANDIN!";
restart.style.display="block";
}

function lose(){
gameEnded=true;
message.style.display="block";
message.innerHTML="OYUNU KAYBETTİN!";
restart.style.display="block";
}

function update(){

if(gameEnded)return;

player.vx=0;

if(left) player.vx=-6;
if(right) player.vx=6;

player.x+=player.vx;

player.vy+=gravity;
player.y+=player.vy;

player.ground=false;

if(player.y+player.r>=500){

let safe=false;

grounds.forEach(g=>{
if(player.x>g.x && player.x<g.x+g.w){
safe=true;
}
});

if(safe){
player.y=500-player.r;
player.vy=0;
player.ground=true;
}
}

hills.forEach(h=>{

if(
player.x+player.r>h.x &&
player.x-player.r<h.x+h.w &&
player.y+player.r>h.y &&
player.y+player.r<h.y+30 &&
player.vy>=0
){
player.y=h.y-player.r;
player.vy=0;
player.ground=true;
}
});

if(player.y>canvas.height+200){
lose();
}

if(player.x>flag.x){
win();
}

cameraX=player.x-canvas.width/3;

if(cameraX<0) cameraX=0;

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

for(let i=0;i<10;i++){
ctx.beginPath();
ctx.fillStyle="white";
ctx.arc(200+i*350-cameraX*0.2,120+(i%2)*30,30,0,Math.PI*2);
ctx.arc(230+i*350-cameraX*0.2,120+(i%2)*30,40,0,Math.PI*2);
ctx.arc(270+i*350-cameraX*0.2,120+(i%2)*30,30,0,Math.PI*2);
ctx.fill();
}

grounds.forEach(g=>{
ctx.fillStyle="green";
ctx.fillRect(g.x-cameraX,500,g.w,200);
});

hills.forEach(h=>{

ctx.fillStyle="#2ecc71";

ctx.beginPath();
ctx.moveTo(h.x-cameraX,h.y+h.h);
ctx.lineTo(h.x+h.w/2-cameraX,h.y);
ctx.lineTo(h.x+h.w-cameraX,h.y+h.h);
ctx.closePath();
ctx.fill();

});

ctx.fillStyle="black";
ctx.fillRect(flag.x-cameraX,flag.y,6,flag.h);

ctx.fillStyle="red";
ctx.fillRect(flag.x+6-cameraX,flag.y,60,40);

ctx.beginPath();
ctx.fillStyle="red";
ctx.arc(player.x-cameraX,player.y,player.r,0,Math.PI*2);
ctx.fill();

}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}

leftBtn=document.getElementById("left");
rightBtn=document.getElementById("right");
jumpBtn=document.getElementById("jump");

leftBtn.ontouchstart=()=>left=true;
leftBtn.ontouchend=()=>left=false;

rightBtn.ontouchstart=()=>right=true;
rightBtn.ontouchend=()=>right=false;

jumpBtn.ontouchstart=()=>{
if(player.ground){
player.vy=-15;
}
};

loop();

</script>
</body>
</html>
