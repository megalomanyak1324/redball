<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mini Red Ball</title>

<style>
body{
margin:0;
overflow:hidden;
background:#87CEEB;
font-family:Arial;
}

canvas{
display:block;
}

#ui{
position:fixed;
bottom:70px;
left:0;
width:100%;
}

.btn{
width:90px;
height:90px;
border:none;
border-radius:50%;
font-size:40px;
background:rgba(255,255,255,.85);
}

#jump{
position:absolute;
left:20px;
}

#left{
position:absolute;
right:120px;
}

#right{
position:absolute;
right:20px;
}

#msg{
position:fixed;
top:40%;
width:100%;
text-align:center;
font-size:40px;
font-weight:bold;
display:none;
}

#restart{
position:fixed;
top:55%;
left:50%;
transform:translateX(-50%);
padding:12px 25px;
font-size:22px;
display:none;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="msg"></div>

<button id="restart" onclick="location.reload()">
Restart
</button>

<div id="ui">
<button class="btn" id="jump">⬆</button>
<button class="btn" id="left">⬅</button>
<button class="btn" id="right">➡</button>
</div>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let cameraX=0;
let gameOver=false;

const gravity=0.7;

const player={
x:100,
y:420,
r:22,
vx:0,
vy:0,
ground:false
};

const grounds=[
{x:0,w:900},
{x:1200,w:900},
{x:2400,w:1200}
];

const flag={
x:3300,
y:350
};

let moveLeft=false;
let moveRight=false;

function win(){
gameOver=true;
msg.innerHTML="KAZANDIN!";
msg.style.display="block";
restart.style.display="block";
}

function lose(){
gameOver=true;
msg.innerHTML="OYUNU KAYBETTİN";
msg.style.display="block";
restart.style.display="block";
}

function update(){

if(gameOver)return;

player.vx=0;

if(moveLeft) player.vx=-6;
if(moveRight) player.vx=6;

player.x+=player.vx;

player.vy+=gravity;
player.y+=player.vy;

player.ground=false;

if(player.y+player.r>=500){

let safe=false;

grounds.forEach(g=>{

if(
player.x>g.x &&
player.x<g.x+g.w
){
safe=true;
}

});

if(safe){
player.y=500-player.r;
player.vy=0;
player.ground=true;
}
}

if(player.y>canvas.height+200){
lose();
}

if(player.x>flag.x){
win();
}

cameraX=player.x-canvas.width/3;

if(cameraX<0) cameraX=0;
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

for(let i=0;i<12;i++){

let x=i*350-cameraX*0.2;

ctx.fillStyle="white";

ctx.beginPath();
ctx.arc(x+60,100,25,0,Math.PI*2);
ctx.arc(x+95,90,35,0,Math.PI*2);
ctx.arc(x+130,100,25,0,Math.PI*2);
ctx.fill();
}

grounds.forEach(g=>{

ctx.fillStyle="green";
ctx.fillRect(
g.x-cameraX,
500,
g.w,
200
);

ctx.fillStyle="#2ecc71";
ctx.fillRect(
g.x-cameraX,
490,
g.w,
10
);

});

ctx.fillStyle="black";
ctx.fillRect(
flag.x-cameraX,
350,
5,
150
);

ctx.fillStyle="red";
ctx.fillRect(
flag.x+5-cameraX,
350,
60,
35
);

ctx.beginPath();
ctx.fillStyle="red";
ctx.arc(
player.x-cameraX,
player.y,
player.r,
0,
Math.PI*2
);
ctx.fill();

ctx.fillStyle="white";

ctx.beginPath();
ctx.arc(player.x-cameraX-7,player.y-5,5,0,Math.PI*2);
ctx.fill();

ctx.beginPath();
ctx.arc(player.x-cameraX+7,player.y-5,5,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="black";

ctx.beginPath();
ctx.arc(player.x-cameraX-7,player.y-5,2,0,Math.PI*2);
ctx.fill();

ctx.beginPath();
ctx.arc(player.x-cameraX+7,player.y-5,2,0,Math.PI*2);
ctx.fill();
}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}

document.getElementById("left").ontouchstart=()=>moveLeft=true;
document.getElementById("left").ontouchend=()=>moveLeft=false;

document.getElementById("right").ontouchstart=()=>moveRight=true;
document.getElementById("right").ontouchend=()=>moveRight=false;

document.getElementById("jump").ontouchstart=()=>{

if(player.ground){
player.vy=-15;
}

};

loop();

</script>
</body>
</html>
