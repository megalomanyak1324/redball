<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Red Ball</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:#87CEEB;
}

canvas{
display:block;
}

#message{
position:fixed;
top:40%;
width:100%;
text-align:center;
font-size:42px;
font-weight:bold;
display:none;
color:white;
text-shadow:2px 2px 4px black;
z-index:1000;
}

#restart{
position:fixed;
top:55%;
left:50%;
transform:translateX(-50%);
padding:15px 30px;
font-size:22px;
display:none;
z-index:1000;
}

#controls{
position:fixed;
bottom:80px;
left:0;
width:100%;
z-index:999;
}

.btn{
width:100px;
height:100px;
border:none;
border-radius:50%;
font-size:42px;
background:rgba(255,255,255,.85);
}

#jump{
position:absolute;
left:25px;
}

#left{
position:absolute;
right:140px;
}

#right{
position:absolute;
right:25px;
}

</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="message"></div>

<button id="restart" onclick="location.reload()">
Restart
</button>

<div id="controls">
<button class="btn" id="jump">⬆</button>
<button class="btn" id="left">⬅</button>
<button class="btn" id="right">➡</button>
</div>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let cameraX=0;
let gameOver=false;

const gravity=0.7;

const player={
x:100,
y:450,
r:22,
vx:0,
vy:0,
ground:false
};

let coinTaken=false;

const grounds=[
{x:0,w:900},
{x:1200,w:900},
{x:2500,w:900},
{x:3900,w:1100},
{x:5600,w:1500}
];

const platforms=[

{x:1600,y:350,w:180,h:20},

{x:4700,y:430,w:150,h:20},
{x:4950,y:360,w:150,h:20},
{x:5200,y:290,w:150,h:20},
{x:5450,y:220,w:150,h:20},
{x:5700,y:150,w:150,h:20}

];

const coin={
x:1690,
y:310,
r:15
};

const flag={
x:5750,
y:30,
h:120
};

let left=false;
  function win(){
gameOver=true;
message.innerHTML="KAZANDIN!";
message.style.display="block";
restart.style.display="block";
}

function lose(){
gameOver=true;
message.innerHTML="OYUNU KAYBETTİN!";
message.style.display="block";
restart.style.display="block";
}

function update(){

if(gameOver)return;

player.vx=0;

if(left) player.vx=-6;
if(right) player.vx=6;

player.x+=player.vx;

player.vy+=gravity;
player.y+=player.vy;

player.ground=false;

if(player.y+player.r>=500){

let safe=false;

grounds.forEach(g=>{

if(
player.x>g.x &&
player.x<g.x+g.w
){
safe=true;
}

});

if(safe){
player.y=500-player.r;
player.vy=0;
player.ground=true;
}

}

platforms.forEach(p=>{

if(
player.x+player.r>p.x &&
player.x-player.r<p.x+p.w &&
player.y+player.r>p.y &&
player.y+player.r<p.y+25 &&
player.vy>=0
){

player.y=p.y-player.r;
player.vy=0;
player.ground=true;

}

});

if(
!coinTaken &&
Math.abs(player.x-coin.x)<35 &&
Math.abs(player.y-coin.y)<35
){
coinTaken=true;
}

if(player.y>canvas.height+250){
lose();
}

if(player.x>flag.x){
win();
}

cameraX=player.x-canvas.width/3;

if(cameraX<0){
cameraX=0;
}

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

for(let i=0;i<20;i++){

let bx=i*450-cameraX*0.2;

ctx.fillStyle="white";

ctx.beginPath();
ctx.arc(bx+60,100,25,0,Math.PI*2);
ctx.arc(bx+90,90,35,0,Math.PI*2);
ctx.arc(bx+130,100,25,0,Math.PI*2);
ctx.fill();

}

grounds.forEach(g=>{

ctx.fillStyle="green";
ctx.fillRect(
g.x-cameraX,
500,
g.w,
200
);

ctx.fillStyle="#2ecc71";
ctx.fillRect(
g.x-cameraX,
490,
g.w,
10
);

});

platforms.forEach(p=>{

ctx.fillStyle="#8B5A2B";
ctx.fillRect(
p.x-cameraX,
p.y,
p.w,
p.h
);

ctx.fillStyle="#2ecc71";
ctx.fillRect(
p.x-cameraX,
p.y-5,
p.w,
5
);

});

if(!coinTaken){

ctx.beginPath();
ctx.fillStyle="gold";

ctx.arc(
coin.x-cameraX,
coin.y,
coin.r,
0,
Math.PI*2
);

ctx.fill();

}

ctx.fillStyle="black";

ctx.fillRect(
flag.x-cameraX,
flag.y,
5,
flag.h
);

ctx.fillStyle="red";

ctx.fillRect(
flag.x+5-cameraX,
flag.y,
55,
35
);

ctx.beginPath();
ctx.fillStyle="red";

ctx.arc(
player.x-cameraX,
player.y,
player.r,
0,
Math.PI*2
);

ctx.fill();

ctx.fillStyle="white";

ctx.beginPath();
ctx.arc(player.x-cameraX-7,player.y-5,5,0,Math.PI*2);
ctx.fill();

ctx.beginPath();
ctx.arc(player.x-cameraX+7,player.y-5,5,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="black";

ctx.beginPath();
ctx.arc(player.x-cameraX-7,player.y-5,2,0,Math.PI*2);
ctx.fill();

ctx.beginPath();
ctx.arc(player.x-cameraX+7,player.y-5,2,0,Math.PI*2);
ctx.fill();

}

function loop(){

update();
draw();

requestAnimationFrame(loop);

}

left.onclick=()=>{};
right.onclick=()=>{};

left.addEventListener("touchstart",()=>left=true);
left.addEventListener("touchend",()=>left=false);

right.addEventListener("touchstart",()=>right=true);
right.addEventListener("touchend",()=>right=false);

jump.addEventListener("touchstart",()=>{

if(player.ground){
player.vy=-15;
}

});

loop();

</script>
</body>
</html>
let right=false;
