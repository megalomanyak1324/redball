<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Red Ball Mini</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial,sans-serif;
}

canvas{
display:block;
background:linear-gradient(#87CEEB,#DDF6FF);
}

#message{
position:fixed;
top:40%;
width:100%;
text-align:center;
font-size:40px;
font-weight:bold;
display:none;
z-index:1000;
}

#restart{
position:fixed;
top:55%;
left:50%;
transform:translateX(-50%);
padding:15px 30px;
font-size:22px;
display:none;
z-index:1000;
}

#ui{
position:fixed;
bottom:90px;
left:0;
width:100%;
z-index:999;
}

.btn{
width:100px;
height:100px;
border:none;
border-radius:50%;
font-size:42px;
background:white;
opacity:.85;
}

#jump{
position:absolute;
left:25px;
}

#left{
position:absolute;
right:140px;
}

#right{
position:absolute;
right:25px;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="message"></div>

<button id="restart" onclick="location.reload()">
Restart
</button>

<div id="ui">
<button class="btn" id="jump">⬆</button>
<button class="btn" id="left">⬅</button>
<button class="btn" id="right">➡</button>
</div>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let cameraX=0;
let gameOver=false;

const player={
x:80,
y:450,
r:22,
vx:0,
vy:0,
ground:false
};

const gravity=0.7;

const grounds=[
{x:0,w:700},
{x:900,w:1700}
];

const platforms=[
{x:400,y:420,w:180,h:20},
{x:750,y:340,w:180,h:20},
{x:1200,y:280,w:180,h:20},
{x:1600,y:360,w:180,h:20}
];

const flag={
x:2350,
y:250,
h:150
};

let left=false;
let right=false;

function win(){
gameOver=true;
document.getElementById("message").innerHTML="KAZANDIN!";
document.getElementById("message").style.display="block";
document.getElementById("restart").style.display="block";
}

function lose(){
gameOver=true;
document.getElementById("message").innerHTML="OYUNU KAYBETTİN";
document.getElementById("message").style.display="block";
document.getElementById("restart").style.display="block";
}

function update(){

if(gameOver)return;

player.vx=0;

if(left) player.vx=-6;
if(right) player.vx=6;

player.x+=player.vx;

player.vy+=gravity;
player.y+=player.vy;

player.ground=false;

if(player.y+player.r>=500){

let safe=false;

grounds.forEach(g=>{
if(player.x>g.x && player.x<g.x+g.w){
safe=true;
}
});

if(safe){
player.y=500-player.r;
player.vy=0;
player.ground=true;
}
}

platforms.forEach(p=>{

if(
player.x+player.r>p.x &&
player.x-player.r<p.x+p.w &&
player.y+player.r>p.y &&
player.y+player.r<p.y+20 &&
player.vy>=0
){
player.y=p.y-player.r;
player.vy=0;
player.ground=true;
}

});

if(player.y>canvas.height+150){
lose();
}

if(player.x>flag.x){
win();
}

cameraX=player.x-canvas.width/3;

if(cameraX<0){
cameraX=0;
}

}

function drawSky(){

for(let i=0;i<8;i++){

let x=i*400-cameraX*0.2;

ctx.fillStyle="white";

ctx.beginPath();
ctx.arc(x+60,100,30,0,Math.PI*2);
ctx.arc(x+95,100,40,0,Math.PI*2);
ctx.arc(x+135,100,30,0,Math.PI*2);
ctx.fill();

}

}

function drawGround(){

grounds.forEach(g=>{

ctx.fillStyle="green";
ctx.fillRect(
g.x-cameraX,
500,
g.w,
200
);

ctx.fillStyle="#2ECC71";
ctx.fillRect(
g.x-cameraX,
490,
g.w,
10
);

});

}

function drawPlatforms(){

platforms.forEach(p=>{

ctx.fillStyle="#8B5A2B";
ctx.fillRect(
p.x-cameraX,
p.y,
p.w,
p.h
);

ctx.fillStyle="#2ECC71";
ctx.fillRect(
p.x-cameraX,
p.y-5,
p.w,
5
);

});

}

function drawFlag(){

ctx.fillStyle="black";
ctx.fillRect(
flag.x-cameraX,
flag.y,
5,
flag.h
);

ctx.fillStyle="red";
ctx.fillRect(
flag.x+5-cameraX,
flag.y,
55,
35
);

}

function drawPlayer(){

ctx.beginPath();
ctx.fillStyle="red";
ctx.arc(
player.x-cameraX,
player.y,
player.r,
0,
Math.PI*2
);
ctx.fill();

}

function loop(){

ctx.clearRect(0,0,canvas.width,canvas.height);

drawSky();
drawGround();
drawPlatforms();
drawFlag();

update();
drawPlayer();

requestAnimationFrame(loop);
}

document.getElementById("left").ontouchstart=()=>left=true;
document.getElementById("left").ontouchend=()=>left=false;

document.getElementById("right").ontouchstart=()=>right=true;
document.getElementById("right").ontouchend=()=>right=false;

document.getElementById("jump").ontouchstart=()=>{
if(player.ground){
player.vy=-15;
}
};

loop();

</script>
</body>
</html>
